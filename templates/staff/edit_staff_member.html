{% extends "base.html" %}
{% load static %}

{% block title %}{{ page_title }}{% endblock title %}

{% block content %}
<div class="container">
    <h2>{{ page_title }}</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="main-actions-bar">
        <button type="submit" class="button button-success">Save Changes</button>
        <a href="{% url 'staff:staff_detail' staff_member.id %}" class="action-link button-secondary">Cancel</a>
    </div>
    </form>
</div>
{% endblock content %}
