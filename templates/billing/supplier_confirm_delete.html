{% extends "base.html" %}

{% block title %}{{ page_title }}{% endblock title %}

{% block content %}
    <h2>{{ page_title }}</h2>
    <p>Are you sure you want to delete the supplier: <strong>"{{ supplier.name }}"</strong>?</p>
    <p class="text-danger">This action cannot be undone.</p>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-actions" style="justify-content: center;">
            <button type="submit" class="button button-danger">Yes, Delete</button>
            <a href="{% url 'billing:supplier_list' %}" class="action-link button-secondary">Cancel</a>
        </div>
    </form>
{% endblock content %}
